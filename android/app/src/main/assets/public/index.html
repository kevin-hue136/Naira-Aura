    <style>
      :root {
        --naira-green: #00d97e;
        --naira-glow: rgba(0, 217, 126, 0.3);
      }
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        margin: 0;
        overflow: hidden;
      }

      /* Dark mode styles */
      html.dark body {
        background: #1A1C20;
        color: #fff;
      }

      html:not(.dark) body {
        background: #fff;
        color: #050505;
      }
      #root {
        height: 100vh;
        width: 100vw;
      }
      .glass-card {
        background: rgba(26, 28, 32, 0.7);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .naira-glow-text {
        text-shadow: 0 0 20px var(--naira-glow);
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 217, 126, 0.1); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0, 217, 126, 0.3); }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
    <script>
      // On page load, check for dark mode preference in local storage
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      } else {
        document.documentElement.classList.remove('dark')
      }

      // Function to toggle dark mode
      window.toggleDarkMode = () => {
        if (document.documentElement.classList.contains('dark')) {
          document.documentElement.classList.remove('dark');
          localStorage.theme = 'light';
        } else {
          document.documentElement.classList.add('dark');
          localStorage.theme = 'dark';
        }
      };
    </script>
